services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: alfa-home-app
    container_name: alfa-home-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "9000:9000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alfa-network

  nginx:
    image: nginx:alpine
    container_name: alfa-home-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - alfa-network

  db:
    image: mysql:8.0
    container_name: alfa-home-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alfa-network

  node:
    image: node:20-alpine
    container_name: alfa-home-node
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run build && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - alfa-network

networks:
  alfa-network:
    driver: bridge

volumes:
  dbdata:
