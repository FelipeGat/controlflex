services:
  nginx:
    image: nginx:alpine
    container_name: alfa-nginx
    ports:
      - "8083:80"
      - "8443:443"
    volumes:
      - app-storage:/var/www/storage
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
      - ./public:/var/www/public
      - ./storage/logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - alfa-network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alfa-app
    working_dir: /var/www
    volumes:
      - app-storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
      - ./.env:/var/www/.env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=alfahome
      - DB_USERNAME=alfahome
      - DB_PASSWORD=ALFAHOME_DB_PASS_2026
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=database
    depends_on:
      db:
        condition: service_healthy
    networks:
      - alfa-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: alfa-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: alfahome
      MYSQL_ROOT_PASSWORD: ALFAHOME_ROOT_2026
      MYSQL_USER: alfahome
      MYSQL_PASSWORD: ALFAHOME_DB_PASS_2026
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alfa-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: alfa-redis
    ports:
      - "6381:6379"
    networks:
      - alfa-network
    restart: unless-stopped

  node:
    image: node:20-alpine
    container_name: alfa-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: sh -c "npm install && npm run build"
    networks:
      - alfa-network
    profiles:
      - build

networks:
  alfa-network:
    driver: bridge

volumes:
  dbdata:
  app-storage:
