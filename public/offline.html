<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AlfaHome — Offline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1120">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b1120;
      --surface: #1f2937;
      --border:  #243447;
      --text:    #e5e7eb;
      --muted:   #9ca3af;
      --subtle:  #6b7280;
      --green:   #22c55e;
      --red:     #ef4444;
      --blue:    #3b82f6;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #0b1120 0%, #0f172a 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px 16px 40px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header img { height: 30px; opacity: .8; }
    .offline-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      background: rgba(255,255,255,.06);
      padding: 4px 10px; border-radius: 20px;
    }
    .offline-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #f59e0b;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .3; }
    }

    /* ── No cache state ── */
    .no-cache {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; text-align: center; gap: 16px;
    }
    .no-cache .icon { font-size: 52px; opacity: .4; }
    .no-cache h2 { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .no-cache p { font-size: 14px; color: var(--subtle); max-width: 260px; line-height: 1.6; }
    .btn-retry {
      margin-top: 8px; padding: 10px 28px;
      background: var(--blue); color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }

    /* ── Cards ── */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--subtle);
      margin: 24px 0 10px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .kpi-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 10px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }
    .kpi-label { font-size: 10px; color: var(--subtle); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .kpi-value { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; }
    .kpi-value.green { color: var(--green); }
    .kpi-value.red   { color: var(--red);   }
    .kpi-value.blue  { color: #60a5fa;      }

    .banco-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .banco-row:last-child { border-bottom: none; }
    .banco-nome { color: var(--text); font-weight: 500; }
    .banco-saldo { font-weight: 700; }

    .tx-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .tx-row:last-child { border-bottom: none; }
    .tx-cat { font-size: 11px; color: var(--subtle); margin-top: 2px; }

    .cached-at {
      font-size: 11px; color: var(--subtle); text-align: center;
      margin-top: 28px;
    }

    @media (max-width: 400px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .kpi-value { font-size: .95rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="/alfa-home-logo.png" alt="AlfaHome" onerror="this.style.display='none'">
    <div class="offline-badge">
      <div class="offline-dot"></div>
      Modo offline
    </div>
  </div>

  <div id="app">
    <!-- Filled by JS from Cache API -->
    <div class="no-cache" id="no-cache">
      <div class="icon">📡</div>
      <h2>Sem conexão</h2>
      <p>Carregando dados em cache...</p>
    </div>
  </div>

  <script>
  (async function () {
    const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
    const fmtCompact = n => {
      const abs = Math.abs(n);
      const s = abs >= 1000 ? 'R$' + (abs/1000).toFixed(1) + 'k' : fmt.format(n);
      return n < 0 ? '-' + s.replace('R$','R$') : s;
    };

    // Try to load the cached API snapshot
    let data = null;
    try {
      const cache = await caches.open('alfahome-data-v3');
      const resp  = await cache.match('/api/dashboard/snapshot');
      if (resp) data = await resp.json();
    } catch (e) {}

    const app   = document.getElementById('app');
    const noCache = document.getElementById('no-cache');

    if (!data) {
      // No cache — show retry button
      noCache.querySelector('p').textContent = 'Nenhum dado em cache. Tente quando estiver online.';
      noCache.innerHTML += '<button class="btn-retry" onclick="window.location.reload()">Tentar novamente</button>';
      return;
    }

    noCache.style.display = 'none';

    const { kpis, bancos, cartoes, lancamentos, periodo, totais } = data;

    let html = '';

    // ── Período ──
    html += `<div style="font-size:13px;color:var(--muted);margin-bottom:4px;">Dados de <strong style="color:var(--text)">${periodo?.mes || ''}</strong></div>`;

    // ── KPIs ──
    html += `<div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Receitas</div>
        <div class="kpi-value green">${fmtCompact(kpis?.receitas || 0)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Despesas</div>
        <div class="kpi-value red">${fmtCompact(kpis?.despesas || 0)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Saldo</div>
        <div class="kpi-value ${(kpis?.saldo||0) >= 0 ? 'green' : 'red'}">${fmtCompact(kpis?.saldo || 0)}</div>
      </div>
    </div>`;

    // ── Saldos em conta ──
    if (bancos?.length) {
      html += `<div class="section-label">Saldo em contas</div><div class="card">`;
      bancos.forEach(b => {
        html += `<div class="banco-row">
          <span class="banco-nome">${b.nome}</span>
          <span class="banco-saldo ${b.saldo >= 0 ? 'green' : 'red'}" style="color:${b.saldo>=0?'var(--green)':'var(--red)'}">${fmt.format(b.saldo)}</span>
        </div>`;
      });
      html += `</div>`;
    }

    // ── Cartões ──
    if (cartoes?.length) {
      html += `<div class="section-label">Cartões de crédito</div><div class="card">`;
      cartoes.forEach(c => {
        html += `<div class="banco-row">
          <span class="banco-nome">${c.nome}</span>
          <span class="banco-saldo" style="color:var(--red)">${fmt.format(c.fatura)}</span>
        </div>`;
      });
      html += `</div>`;
    }

    // ── Últimos lançamentos ──
    if (lancamentos?.length) {
      html += `<div class="section-label">Últimos lançamentos</div><div class="card">`;
      lancamentos.forEach(t => {
        const isRec = t.tipo === 'receita';
        html += `<div class="tx-row">
          <div>
            <div style="font-weight:600;color:var(--text)">${t.categoria}</div>
            <div class="tx-cat">${t.data}</div>
          </div>
          <div style="font-weight:700;color:${isRec ? 'var(--green)' : 'var(--red)'}">${isRec?'+':'-'}${fmt.format(t.valor)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // ── Cached at ──
    if (data.cached_at) {
      const d = new Date(data.cached_at);
      html += `<div class="cached-at">Última atualização: ${d.toLocaleString('pt-BR')}</div>`;
    }

    html += `<div style="text-align:center;margin-top:16px">
      <button class="btn-retry" onclick="window.location.reload()">Tentar reconectar</button>
    </div>`;

    app.innerHTML = html;
  })();
  </script>
</body>
</html>
